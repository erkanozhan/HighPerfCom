<svg xmlns="http://www.w3.org/2000/svg" width="720" height="175" viewBox="0 0 720 175">
  <defs>
    <style>
      text { font-family: 'Segoe UI', Helvetica, Arial, sans-serif; }
    </style>
  </defs>

  <!-- Title -->
  <text x="360" y="22" text-anchor="middle" font-size="13" font-weight="bold" fill="#1a252f">Sabit Noktalı (Fixed-Point) 32-bit Temsil</text>

  <!-- Integer part block -->
  <rect x="40" y="38" width="290" height="62" rx="5" fill="#fdecea" stroke="#c0392b" stroke-width="2"/>
  <text x="185" y="65" text-anchor="middle" font-size="13" font-weight="bold" fill="#922b21">Tam Sayı Kısmı</text>
  <text x="185" y="83" text-anchor="middle" font-size="11" fill="#922b21">(Integer Part — 16 bit)</text>
  <text x="185" y="98" text-anchor="middle" font-size="10" fill="#7b241c">bit 31 ← → bit 16</text>

  <!-- Fixed decimal point indicator -->
  <circle cx="360" cy="69" r="7" fill="#2c3e50"/>
  <line x1="360" x2="360" y1="76" y2="112" stroke="#2c3e50" stroke-width="1.5" stroke-dasharray="4,2"/>
  <text x="360" y="122" text-anchor="middle" font-size="10" font-weight="bold" fill="#2c3e50">Nokta</text>
  <text x="360" y="134" text-anchor="middle" font-size="10" fill="#2c3e50">sabittir</text>

  <!-- Fractional part block -->
  <rect x="390" y="38" width="290" height="62" rx="5" fill="#eaf5ea" stroke="#1e8449" stroke-width="2"/>
  <text x="535" y="65" text-anchor="middle" font-size="13" font-weight="bold" fill="#1a5276">Kesir Kısmı</text>
  <text x="535" y="83" text-anchor="middle" font-size="11" fill="#1a5276">(Fractional Part — 16 bit)</text>
  <text x="535" y="98" text-anchor="middle" font-size="10" fill="#1a5276">bit 15 ← → bit 0</text>

  <!-- Problem annotation -->
  <text x="360" y="155" text-anchor="middle" font-size="11" fill="#7f8c8d">Büyük sayılarda tam sayı kısmı taşar (overflow) — küçük sayılarda kesir kısmı yetersiz kalır (underflow).</text>
</svg>
