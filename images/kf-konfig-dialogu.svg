<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 740 560" font-family="'Segoe UI', Arial, sans-serif">
  <defs>
    <filter id="sh" x="-5%" y="-5%" width="115%" height="115%">
      <feDropShadow dx="2" dy="3" stdDeviation="5" flood-opacity="0.20"/>
    </filter>
  </defs>

  <!-- Dimmed background (modal overlay hint) -->
  <rect width="740" height="560" fill="#2c3e50" opacity="0.25" rx="4"/>

  <!-- Dialog box -->
  <g filter="url(#sh)">
    <rect x="20" y="10" width="700" height="540" rx="8" fill="#f5f6fa" stroke="#bdc3c7" stroke-width="1.5"/>

    <!-- Title bar -->
    <rect x="20" y="10" width="700" height="36" rx="8" fill="#c8622a"/>
    <rect x="20" y="28" width="700" height="18" fill="#c8622a"/>
    <text x="40" y="33" fill="white" font-size="13" font-weight="bold">WekaClassifierSparkJob — Yapilandirma (Configure)</text>
    <circle cx="700" cy="28" r="9" fill="#e74c3c"/>
    <text x="700" y="33" text-anchor="middle" fill="white" font-size="13" font-weight="bold">x</text>

    <!-- Tabs -->
    <rect x="25" y="52" width="155" height="28" rx="4" fill="#c8622a"/>
    <text x="103" y="70" text-anchor="middle" fill="white" font-size="11" font-weight="bold">Spark Ayarlari</text>
    <rect x="185" y="56" width="145" height="24" rx="4" fill="#ecf0f1" stroke="#bdc3c7"/>
    <text x="257" y="72" text-anchor="middle" fill="#7f8c8d" font-size="11">Siniflandirici</text>
    <rect x="335" y="56" width="145" height="24" rx="4" fill="#ecf0f1" stroke="#bdc3c7"/>
    <text x="407" y="72" text-anchor="middle" fill="#7f8c8d" font-size="11">Gelismis</text>

    <!-- Divider below tabs -->
    <line x1="25" y1="80" x2="715" y2="80" stroke="#bdc3c7" stroke-width="1"/>

    <!-- ── FIELD 1: Spark Master URL ── -->
    <text x="36" y="104" fill="#2c3e50" font-size="12" font-weight="bold">Spark Master URL</text>
    <text x="36" y="120" fill="#7f8c8d" font-size="10">local[N] = yerel, spark://host:7077 = bagimsiz kume, yarn = Hadoop</text>
    <rect x="36" y="126" width="662" height="30" rx="4" fill="white" stroke="#2e6da4" stroke-width="2"/>
    <text x="50" y="146" fill="#2c3e50" font-size="12">local[4]</text>
    <rect x="672" y="126" width="26" height="30" rx="4" fill="#ecf0f1" stroke="#bdc3c7"/>
    <text x="685" y="146" text-anchor="middle" fill="#7f8c8d" font-size="16">&#9660;</text>

    <!-- ── FIELD 2: Input path ── -->
    <text x="36" y="175" fill="#2c3e50" font-size="12" font-weight="bold">Giris Dosyasi / Dizini</text>
    <text x="36" y="191" fill="#7f8c8d" font-size="10">ARFF dosya yolu veya dizin  (yerel yol ya da hdfs://...)</text>
    <rect x="36" y="197" width="604" height="30" rx="4" fill="white" stroke="#bdc3c7" stroke-width="1.5"/>
    <text x="50" y="217" fill="#2c3e50" font-size="12">/veri/karisik/</text>
    <rect x="646" y="197" width="52" height="30" rx="4" fill="#ecf0f1" stroke="#bdc3c7"/>
    <text x="672" y="216" text-anchor="middle" fill="#2c3e50" font-size="11">Goz At</text>

    <!-- ── FIELD 3: Output directory ── -->
    <text x="36" y="247" fill="#2c3e50" font-size="12" font-weight="bold">Cikis Dizini</text>
    <rect x="36" y="257" width="604" height="30" rx="4" fill="white" stroke="#bdc3c7" stroke-width="1.5"/>
    <text x="50" y="277" fill="#2c3e50" font-size="12">/veri/model</text>
    <rect x="646" y="257" width="52" height="30" rx="4" fill="#ecf0f1" stroke="#bdc3c7"/>
    <text x="672" y="276" text-anchor="middle" fill="#2c3e50" font-size="11">Goz At</text>

    <!-- ── FIELD 4: Num iterations ── -->
    <text x="36" y="310" fill="#2c3e50" font-size="12" font-weight="bold">Iterasyon Sayisi  (-num-iterations)</text>
    <text x="36" y="326" fill="#7f8c8d" font-size="10">Veri bolum sayisi. Toplam cekirdek sayisinin 2-3 kati iyi bir baslangictor.</text>
    <rect x="36" y="332" width="110" height="30" rx="4" fill="white" stroke="#bdc3c7" stroke-width="1.5"/>
    <text x="50" y="352" fill="#2c3e50" font-size="13">16</text>

    <!-- ── FIELD 5: Classifier chooser ── -->
    <text x="36" y="385" fill="#2c3e50" font-size="12" font-weight="bold">Siniflandirici (Classifier)</text>
    <text x="36" y="401" fill="#7f8c8d" font-size="10">Weka siniflandirici sinif adi ve secenekleri</text>
    <rect x="36" y="407" width="564" height="30" rx="4" fill="white" stroke="#2e6da4" stroke-width="2"/>
    <text x="50" y="427" fill="#1a4a8a" font-size="11">weka.classifiers.trees.RandomForest    -I 100  -K 0  -depth 0</text>
    <rect x="606" y="407" width="92" height="30" rx="4" fill="#2e6da4"/>
    <text x="652" y="427" text-anchor="middle" fill="white" font-size="11" font-weight="bold">Sec / Ayarla</text>

    <!-- ── FIELD 6: ARFF header (auto-filled) ── -->
    <text x="36" y="460" fill="#2c3e50" font-size="12" font-weight="bold">ARFF Baslik Dosyasi  (Opsiyon)</text>
    <text x="36" y="476" fill="#7f8c8d" font-size="10">Onceki adimdan (CSVToARFFHeaderSparkJob) otomatik aktarilir.</text>
    <rect x="36" y="482" width="662" height="30" rx="4" fill="#f0f3f7" stroke="#bdc3c7" stroke-width="1"/>
    <text x="50" y="502" fill="#95a5a6" font-size="11">/veri/header/schema.arff   (otomatik)</text>

    <!-- Bottom divider -->
    <line x1="25" y1="525" x2="715" y2="525" stroke="#ecf0f1" stroke-width="1.5"/>

    <!-- Buttons -->
    <rect x="490" y="533" width="110" height="32" rx="5" fill="#27ae60"/>
    <text x="545" y="553" text-anchor="middle" fill="white" font-size="12" font-weight="bold">Tamam</text>
    <rect x="610" y="533" width="110" height="32" rx="5" fill="#ecf0f1" stroke="#bdc3c7"/>
    <text x="665" y="553" text-anchor="middle" fill="#2c3e50" font-size="12">Iptal</text>
  </g>
</svg>
