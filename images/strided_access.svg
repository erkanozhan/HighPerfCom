<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 350" font-family="sans-serif">
    <rect width="800" height="350" fill="#f4f6f9"/>
    
    <text x="400" y="30" font-size="20" font-weight="bold" fill="#2c3e50" text-anchor="middle">Bellekte 2 Boyutlu Matris Dizilimi (Row-Major Order)</text>
    
    <g transform="translate(100, 70)">
        <text x="75" y="-15" font-size="14" font-weight="bold" fill="#7f8c8d" text-anchor="middle">Kod Görünümü (3x3)</text>
        <rect x="0" y="0" width="50" height="50" fill="#3498db" stroke="#fff" stroke-width="2"/>
        <text x="25" y="30" font-size="16" fill="#fff" text-anchor="middle">0,0</text>
        <rect x="50" y="0" width="50" height="50" fill="#3498db" stroke="#fff" stroke-width="2"/>
        <text x="75" y="30" font-size="16" fill="#fff" text-anchor="middle">0,1</text>
        <rect x="100" y="0" width="50" height="50" fill="#3498db" stroke="#fff" stroke-width="2"/>
        <text x="125" y="30" font-size="16" fill="#fff" text-anchor="middle">0,2</text>
        <rect x="0" y="50" width="50" height="50" fill="#e67e22" stroke="#fff" stroke-width="2"/>
        <text x="25" y="80" font-size="16" fill="#fff" text-anchor="middle">1,0</text>
        <rect x="50" y="50" width="50" height="50" fill="#e67e22" stroke="#fff" stroke-width="2"/>
        <text x="75" y="80" font-size="16" fill="#fff" text-anchor="middle">1,1</text>
        <rect x="100" y="50" width="50" height="50" fill="#e67e22" stroke="#fff" stroke-width="2"/>
        <text x="125" y="80" font-size="16" fill="#fff" text-anchor="middle">1,2</text>
        <rect x="0" y="100" width="50" height="50" fill="#2ecc71" stroke="#fff" stroke-width="2"/>
        <text x="25" y="130" font-size="16" fill="#fff" text-anchor="middle">2,0</text>
        <rect x="50" y="100" width="50" height="50" fill="#2ecc71" stroke="#fff" stroke-width="2"/>
        <text x="75" y="130" font-size="16" fill="#fff" text-anchor="middle">2,1</text>
        <rect x="100" y="100" width="50" height="50" fill="#2ecc71" stroke="#fff" stroke-width="2"/>
        <text x="125" y="130" font-size="16" fill="#fff" text-anchor="middle">2,2</text>
    </g>

    <text x="400" y="270" font-size="16" font-weight="bold" fill="#7f8c8d" text-anchor="middle">Fiziksel Bellek (Tek Boyutlu Dizilim)</text>
    <g transform="translate(150, 280)">
        <rect x="0" y="0" width="50" height="40" fill="#3498db" stroke="#fff" stroke-width="2"/>
        <rect x="50" y="0" width="50" height="40" fill="#3498db" stroke="#fff" stroke-width="2"/>
        <rect x="100" y="0" width="50" height="40" fill="#3498db" stroke="#fff" stroke-width="2"/>
        <rect x="150" y="0" width="50" height="40" fill="#e67e22" stroke="#fff" stroke-width="2"/>
        <rect x="200" y="0" width="50" height="40" fill="#e67e22" stroke="#fff" stroke-width="2"/>
        <rect x="250" y="0" width="50" height="40" fill="#e67e22" stroke="#fff" stroke-width="2"/>
        <rect x="300" y="0" width="50" height="40" fill="#2ecc71" stroke="#fff" stroke-width="2"/>
        <rect x="350" y="0" width="50" height="40" fill="#2ecc71" stroke="#fff" stroke-width="2"/>
        <rect x="400" y="0" width="50" height="40" fill="#2ecc71" stroke="#fff" stroke-width="2"/>
        <text x="25" y="25" font-size="12" fill="#fff" text-anchor="middle">0,0</text>
        <text x="175" y="25" font-size="12" fill="#fff" text-anchor="middle">1,0</text>
        <text x="325" y="25" font-size="12" fill="#fff" text-anchor="middle">2,0</text>
    </g>

    <defs>
        <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#e74c3c" /></marker>
        <marker id="arrow-green" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#27ae60" /></marker>
    </defs>

    <path d="M 330 110 Q 400 110 470 110" fill="none" stroke="#27ae60" stroke-width="3" stroke-dasharray="6,4" marker-end="url(#arrow-green)"/>
    <text x="400" y="100" font-size="14" font-weight="bold" fill="#27ae60" text-anchor="middle">Satır Erişimi (Ardışık / Hızlı)</text>

    <path d="M 400 140 Q 550 200 680 140" fill="none" stroke="#e74c3c" stroke-width="3" stroke-dasharray="6,4" marker-end="url(#arrow)"/>
    <text x="540" y="210" font-size="14" font-weight="bold" fill="#e74c3c" text-anchor="middle">Sütun Erişimi (Adımlı / Zıplamalı)</text>
    
    <path d="M 175 275 Q 250 220 325 275" fill="none" stroke="#e74c3c" stroke-width="2" marker-end="url(#arrow)"/>
    <path d="M 325 275 Q 400 220 475 275" fill="none" stroke="#e74c3c" stroke-width="2" marker-end="url(#arrow)"/>
</svg>
