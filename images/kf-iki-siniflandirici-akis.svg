<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 330" font-family="'Segoe UI', Arial, sans-serif">
  <defs>
    <marker id="arr-g" markerWidth="9" markerHeight="7" refX="8" refY="3.5" orient="auto">
      <polygon points="0 0, 9 3.5, 0 7" fill="#27ae60"/>
    </marker>
    <marker id="arr-b" markerWidth="9" markerHeight="7" refX="8" refY="3.5" orient="auto">
      <polygon points="0 0, 9 3.5, 0 7" fill="#2e6da4"/>
    </marker>
    <filter id="sh" x="-6%" y="-6%" width="116%" height="116%">
      <feDropShadow dx="1" dy="2" stdDeviation="3" flood-opacity="0.16"/>
    </filter>
  </defs>

  <rect width="920" height="330" fill="#eef1f5" rx="12"/>
  <text x="460" y="26" text-anchor="middle" font-size="14" font-weight="bold" fill="#1a1a2e">Şablon Akışı: İki Sınıflandırıcı Eğitimi ve Kaydetme</text>
  <text x="460" y="42" text-anchor="middle" font-size="10" fill="#7f8c8d">Bileşenler soldan sağa, success bağlantısıyla sırayla tetiklenir</text>

  <!-- 1. ArffHeaderSparkJob -->
  <g filter="url(#sh)">
    <rect x="30" y="58" width="200" height="68" rx="7" fill="white" stroke="#2e6da4" stroke-width="2.5"/>
    <rect x="30" y="58" width="200" height="22" rx="7" fill="#2e6da4"/>
    <rect x="30" y="72" width="200" height="8" fill="#2e6da4"/>
    <text x="130" y="74" text-anchor="middle" fill="white" font-size="10" font-weight="bold">ArffHeaderSparkJob</text>
    <text x="130" y="92" text-anchor="middle" fill="#2c3e50" font-size="9">CSV yükler, RDD oluşturur</text>
    <text x="130" y="106" text-anchor="middle" fill="#7f8c8d" font-size="9">Mevcut başlık varsa yeniden</text>
    <text x="130" y="118" text-anchor="middle" fill="#7f8c8d" font-size="9">hesaplamaz, yükler</text>
  </g>

  <!-- arrow 1 → 2 -->
  <line x1="230" y1="92" x2="270" y2="92" stroke="#27ae60" stroke-width="2" marker-end="url(#arr-g)"/>
  <text x="250" y="84" text-anchor="middle" fill="#27ae60" font-size="9" font-weight="bold">success</text>

  <!-- 2. WekaClassifierSparkJob - Naive Bayes -->
  <g filter="url(#sh)">
    <rect x="272" y="58" width="220" height="68" rx="7" fill="white" stroke="#c8622a" stroke-width="2.5"/>
    <rect x="272" y="58" width="220" height="22" rx="7" fill="#c8622a"/>
    <rect x="272" y="72" width="220" height="8" fill="#c8622a"/>
    <text x="382" y="74" text-anchor="middle" fill="white" font-size="10" font-weight="bold">WekaClassifierSparkJob</text>
    <text x="382" y="92" text-anchor="middle" fill="#2c3e50" font-size="9">Sınıflandırıcı: NaiveBayes</text>
    <text x="382" y="106" text-anchor="middle" fill="#7f8c8d" font-size="9">Model dosyası: naiveBayes.model</text>
    <text x="382" y="118" text-anchor="middle" fill="#7f8c8d" font-size="9">Çıkış: sparkOutput/model/</text>
  </g>

  <!-- text connection to TextViewer 1 -->
  <line x1="382" y1="126" x2="382" y2="160" stroke="#2e6da4" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arr-b)"/>
  <text x="393" y="148" fill="#2e6da4" font-size="9">text</text>

  <!-- TextViewer 1 -->
  <g filter="url(#sh)">
    <rect x="310" y="162" width="145" height="44" rx="6" fill="white" stroke="#6a3d9a" stroke-width="1.5"/>
    <rect x="310" y="162" width="145" height="18" rx="6" fill="#6a3d9a"/>
    <rect x="310" y="172" width="145" height="8" fill="#6a3d9a"/>
    <text x="382" y="174" text-anchor="middle" fill="white" font-size="9" font-weight="bold">TextViewer</text>
    <text x="382" y="194" text-anchor="middle" fill="#2c3e50" font-size="8">NaiveBayes modeli (1 model)</text>
  </g>

  <!-- arrow 2 → 3 -->
  <line x1="492" y1="92" x2="532" y2="92" stroke="#27ae60" stroke-width="2" marker-end="url(#arr-g)"/>
  <text x="512" y="84" text-anchor="middle" fill="#27ae60" font-size="9" font-weight="bold">success</text>

  <!-- 3. RandomlyShuffleDataSparkJob -->
  <g filter="url(#sh)">
    <rect x="534" y="58" width="200" height="68" rx="7" fill="white" stroke="#7b52ab" stroke-width="2"/>
    <rect x="534" y="58" width="200" height="22" rx="7" fill="#7b52ab"/>
    <rect x="534" y="72" width="200" height="8" fill="#7b52ab"/>
    <text x="634" y="74" text-anchor="middle" fill="white" font-size="10" font-weight="bold">RandomlyShuffleDataSparkJob</text>
    <text x="634" y="92" text-anchor="middle" fill="#2c3e50" font-size="9">Örnek sırasını karıştırır</text>
    <text x="634" y="106" text-anchor="middle" fill="#7f8c8d" font-size="9">Ağaç / kural öğrenicileri için</text>
    <text x="634" y="118" text-anchor="middle" fill="#7f8c8d" font-size="9">sınıf dağılımını dengeler</text>
  </g>

  <!-- arrow 3 → 4 -->
  <line x1="734" y1="92" x2="774" y2="92" stroke="#27ae60" stroke-width="2" marker-end="url(#arr-g)"/>
  <text x="754" y="84" text-anchor="middle" fill="#27ae60" font-size="9" font-weight="bold">success</text>

  <!-- 4. WekaClassifierSparkJob - JRip -->
  <g filter="url(#sh)">
    <rect x="776" y="58" width="130" height="68" rx="7" fill="white" stroke="#c8622a" stroke-width="2.5"/>
    <rect x="776" y="58" width="130" height="22" rx="7" fill="#c8622a"/>
    <rect x="776" y="72" width="130" height="8" fill="#c8622a"/>
    <text x="841" y="74" text-anchor="middle" fill="white" font-size="10" font-weight="bold">WekaClassifierSpark</text>
    <text x="841" y="92" text-anchor="middle" fill="#2c3e50" font-size="9">Sınıflandırıcı: JRip</text>
    <text x="841" y="106" text-anchor="middle" fill="#7f8c8d" font-size="9">→ Voted Ensemble</text>
    <text x="841" y="118" text-anchor="middle" fill="#7f8c8d" font-size="9">(4 kural seti)</text>
  </g>

  <!-- text connection to TextViewer 2 -->
  <line x1="841" y1="126" x2="841" y2="160" stroke="#2e6da4" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arr-b)"/>
  <text x="852" y="148" fill="#2e6da4" font-size="9">text</text>

  <!-- TextViewer 2 -->
  <g filter="url(#sh)">
    <rect x="770" y="162" width="145" height="44" rx="6" fill="white" stroke="#6a3d9a" stroke-width="1.5"/>
    <rect x="770" y="162" width="145" height="18" rx="6" fill="#6a3d9a"/>
    <rect x="770" y="172" width="145" height="8" fill="#6a3d9a"/>
    <text x="842" y="174" text-anchor="middle" fill="white" font-size="9" font-weight="bold">TextViewer</text>
    <text x="842" y="194" text-anchor="middle" fill="#2c3e50" font-size="8">JRip — 4 model, oy birliği</text>
  </g>

  <!-- Output dir annotation -->
  <rect x="30" y="225" width="860" height="90" rx="8" fill="white" stroke="#bdc3c7" stroke-width="1"/>
  <rect x="30" y="225" width="860" height="20" rx="8" fill="#2c3e50"/>
  <rect x="30" y="237" width="860" height="8" fill="#2c3e50"/>
  <text x="460" y="238" text-anchor="middle" fill="white" font-size="10" font-weight="bold">Dosya Sistemi Çıktıları — sparkOutput/ dizini</text>
  <text x="55" y="258" fill="#2e7d32" font-size="10" font-family="'Courier New', monospace">sparkOutput/</text>
  <text x="75" y="272" fill="#2c3e50" font-size="10" font-family="'Courier New', monospace">├── arffHeader/</text>
  <text x="95" y="286" fill="#7f8c8d" font-size="10" font-family="'Courier New', monospace">│   └── hypo.arff          ← ArffHeaderSparkJob çıktısı</text>
  <text x="75" y="300" fill="#2c3e50" font-size="10" font-family="'Courier New', monospace">└── model/</text>
  <text x="95" y="314" fill="#7f8c8d" font-size="10" font-family="'Courier New', monospace">    ├── naiveBayes.model    ← Tek NaiveBayes modeli</text>
  <!-- second line overlaps, skip -->
</svg>
