  <rect x="42" y="65" width="30" height="24" rx="4" fill="white" stroke="#b2bec3"/>
  <text x="57" y="81" text-anchor="middle" fill="#636e72" font-size="10">Ac</text>
  <rect x="76" y="65" width="30" height="24" rx="4" fill="white" stroke="#b2bec3"/>
  <text x="91" y="81" text-anchor="middle" fill="#636e72" font-size="10">Kaydet</text>
