<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 420" font-family="'Segoe UI', Arial, sans-serif">
  <defs>
    <marker id="arr-g" markerWidth="9" markerHeight="7" refX="8" refY="3.5" orient="auto">
      <polygon points="0 0, 9 3.5, 0 7" fill="#27ae60"/>
    </marker>
    <marker id="arr-r" markerWidth="9" markerHeight="7" refX="8" refY="3.5" orient="auto">
      <polygon points="0 0, 9 3.5, 0 7" fill="#e74c3c"/>
    </marker>
    <filter id="sh" x="-8%" y="-8%" width="120%" height="120%">
      <feDropShadow dx="2" dy="3" stdDeviation="4" flood-opacity="0.22"/>
    </filter>
  </defs>

  <!-- Canvas background -->
  <rect width="720" height="420" fill="#eef1f5" rx="8"/>
  <text x="360" y="26" text-anchor="middle" fill="#7f8c8d" font-size="11">Kanvas — Sag tiklama ile bilesenleri baglama</text>

  <!-- Step badges -->
  <circle cx="60" cy="148" r="16" fill="#e74c3c"/>
  <text x="60" y="153" text-anchor="middle" fill="white" font-size="12" font-weight="bold">1</text>
  <circle cx="318" cy="238" r="16" fill="#e74c3c"/>
  <text x="318" y="243" text-anchor="middle" fill="white" font-size="12" font-weight="bold">2</text>
  <circle cx="590" cy="148" r="16" fill="#e74c3c"/>
  <text x="590" y="153" text-anchor="middle" fill="white" font-size="12" font-weight="bold">3</text>

  <!-- Step labels -->
  <text x="60" y="390" text-anchor="middle" fill="#e74c3c" font-size="10" font-weight="bold">Kaynak bilesene</text>
  <text x="60" y="403" text-anchor="middle" fill="#e74c3c" font-size="10" font-weight="bold">sag tikla</text>
  <text x="318" y="390" text-anchor="middle" fill="#e74c3c" font-size="10" font-weight="bold">Connect → success</text>
  <text x="318" y="403" text-anchor="middle" fill="#e74c3c" font-size="10" font-weight="bold">secenegi tikla</text>
  <text x="590" y="390" text-anchor="middle" fill="#e74c3c" font-size="10" font-weight="bold">Hedef bilesene</text>
  <text x="590" y="403" text-anchor="middle" fill="#e74c3c" font-size="10" font-weight="bold">sol tikla</text>

  <!-- Component 1: CSVToARFFHeader -->
  <g filter="url(#sh)">
    <rect x="30" y="100" width="215" height="65" rx="6" fill="white" stroke="#2e6da4" stroke-width="2.5"/>
    <rect x="30" y="100" width="215" height="22" rx="6" fill="#2e6da4"/>
    <rect x="30" y="114" width="215" height="8" fill="#2e6da4"/>
    <text x="137" y="116" text-anchor="middle" fill="white" font-size="9" font-weight="bold">CSVToARFFHeaderSparkJob</text>
    <text x="137" y="134" text-anchor="middle" fill="#2c3e50" font-size="9">Giris: /veri/egitim.csv</text>
    <text x="137" y="148" text-anchor="middle" fill="#7f8c8d" font-size="9">master: local[4]</text>
    <text x="137" y="160" text-anchor="middle" fill="#7f8c8d" font-size="9">Cikis: /veri/header</text>
  </g>
  <!-- Right port -->
  <circle cx="245" cy="132" r="6" fill="#2e6da4" stroke="white" stroke-width="2"/>

  <!-- Dashed line being drawn to target -->
  <line x1="245" y1="132" x2="475" y2="132" stroke="#27ae60" stroke-width="2" stroke-dasharray="8,5" marker-end="url(#arr-g)"/>
  <text x="360" y="124" text-anchor="middle" fill="#27ae60" font-size="10" font-weight="bold">success</text>

  <!-- Component 2: WekaClassifierSparkJob -->
  <g filter="url(#sh)">
    <rect x="477" y="100" width="215" height="65" rx="6" fill="white" stroke="#c8622a" stroke-width="2"/>
    <rect x="477" y="100" width="215" height="22" rx="6" fill="#c8622a"/>
    <rect x="477" y="114" width="215" height="8" fill="#c8622a"/>
    <text x="584" y="116" text-anchor="middle" fill="white" font-size="9" font-weight="bold">WekaClassifierSparkJob</text>
    <text x="584" y="134" text-anchor="middle" fill="#2c3e50" font-size="9">Siniflandirici: J48</text>
    <text x="584" y="148" text-anchor="middle" fill="#7f8c8d" font-size="9">Iterasyon: 16</text>
    <text x="584" y="160" text-anchor="middle" fill="#7f8c8d" font-size="9">Cikis: /veri/model</text>
  </g>
  <!-- Left port (target) -->
  <circle cx="477" cy="132" r="6" fill="#c8622a" stroke="white" stroke-width="2"/>

  <!-- Right-click context menu for Component 1 -->
  <g filter="url(#sh)">
    <rect x="245" y="176" width="195" height="172" rx="5" fill="white" stroke="#bdc3c7" stroke-width="1"/>
    <!-- Menu title bar -->
    <rect x="245" y="176" width="195" height="24" rx="5" fill="#2e6da4"/>
    <rect x="245" y="188" width="195" height="12" fill="#2e6da4"/>
    <text x="342" y="192" text-anchor="middle" fill="white" font-size="10" font-weight="bold">CSVToARFFHeader...</text>

    <!-- Menu item: Configure -->
    <rect x="245" y="200" width="195" height="28" fill="white"/>
    <text x="262" y="218" fill="#2c3e50" font-size="11">Configure...</text>
    <line x1="250" y1="228" x2="435" y2="228" stroke="#ecf0f1" stroke-width="1"/>

    <!-- Menu item: Connect (highlighted) -->
    <rect x="245" y="228" width="195" height="28" fill="#eaf4ea"/>
    <text x="262" y="247" fill="#27ae60" font-size="11" font-weight="bold">Connect</text>
    <text x="432" y="247" text-anchor="end" fill="#7f8c8d" font-size="12">&#9658;</text>
    <line x1="250" y1="256" x2="435" y2="256" stroke="#ecf0f1" stroke-width="1"/>

    <!-- Menu item: Delete -->
    <rect x="245" y="256" width="195" height="28" fill="white"/>
    <text x="262" y="274" fill="#2c3e50" font-size="11">Delete</text>
    <line x1="250" y1="284" x2="435" y2="284" stroke="#ecf0f1" stroke-width="1"/>

    <!-- Menu item: Rename -->
    <rect x="245" y="284" width="195" height="28" fill="white"/>
    <text x="262" y="303" fill="#2c3e50" font-size="11">Rename...</text>
    <line x1="250" y1="312" x2="435" y2="312" stroke="#ecf0f1" stroke-width="1"/>

    <!-- Menu item: Show results -->
    <rect x="245" y="312" width="195" height="28" rx="5" fill="white"/>
    <text x="262" y="330" fill="#2c3e50" font-size="11">Show results</text>
  </g>

  <!-- Sub-menu for Connect -->
  <g filter="url(#sh)">
    <rect x="438" y="228" width="130" height="56" rx="5" fill="white" stroke="#bdc3c7" stroke-width="1"/>
    <!-- success item (highlighted) -->
    <rect x="438" y="228" width="130" height="28" rx="5" fill="#eaf4ea"/>
    <rect x="438" y="242" width="130" height="14" fill="#eaf4ea"/>
    <text x="453" y="247" fill="#27ae60" font-size="11" font-weight="bold">success</text>
    <line x1="443" y1="256" x2="563" y2="256" stroke="#ecf0f1" stroke-width="1"/>
    <!-- failure item -->
    <rect x="438" y="256" width="130" height="28" rx="5" fill="white"/>
    <text x="453" y="275" fill="#7f8c8d" font-size="11">failure</text>
  </g>

  <!-- Annotation callout for "success" -->
  <rect x="440" y="190" width="230" height="32" rx="5" fill="#fef9e7" stroke="#f39c12" stroke-width="1.5"/>
  <text x="555" y="205" text-anchor="middle" fill="#d35400" font-size="10" font-weight="bold">"success": onceki is bitince</text>
  <text x="555" y="218" text-anchor="middle" fill="#d35400" font-size="10">bir sonrakini otomatik baslat</text>
</svg>
