<svg xmlns="http://www.w3.org/2000/svg" width="720" height="300" viewBox="0 0 720 300">
  <defs>
    <style>.sf{font-family:'Segoe UI',Helvetica,Arial,sans-serif}.mf{font-family:'Consolas','Courier New',monospace}</style>
    <marker id="ah" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
      <path d="M0 0 L6 3 L0 6 Z" fill="#c62828"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="360" y="14" text-anchor="middle" font-size="12" font-weight="bold" fill="#1a252f" class="sf">AoS ve SoA Bellek Yerleşimi — Önbellek Satırı Verimliliği</text>

  <!-- ===== AoS Panel ===== -->
  <rect x="8" y="20" width="704" height="96" rx="4" fill="#fff5f5" stroke="#e05555" stroke-width="1.2"/>
  <text x="360" y="33" text-anchor="middle" font-size="11" font-weight="bold" fill="#c62828" class="sf">AoS — Array of Structures   (Yapıların Dizisi)</text>

  <!-- AoS: 12 cells. cell_w=54, stride=56. start_x=24, y=40, h=28 -->
  <!-- X cells: #ffcccc / #cc4444   Y cells: #ddeeff / #5577cc   Z cells: #ddffee / #44aa66 -->

  <!-- Struct 0 -->
  <rect x="24"  y="40" width="54" height="28" rx="2" fill="#ffcccc" stroke="#cc4444" stroke-width="2"/>
  <text x="51"  y="58" text-anchor="middle" font-size="10" font-weight="bold" fill="#882222" class="mf">X₀</text>
  <rect x="80"  y="40" width="54" height="28" rx="2" fill="#ddeeff" stroke="#5577cc" stroke-width="1"/>
  <text x="107" y="58" text-anchor="middle" font-size="10" fill="#335599" class="mf">Y₀</text>
  <rect x="136" y="40" width="54" height="28" rx="2" fill="#ddffee" stroke="#44aa66" stroke-width="1"/>
  <text x="163" y="58" text-anchor="middle" font-size="10" fill="#226644" class="mf">Z₀</text>

  <!-- Struct 1 -->
  <line x1="191" y1="40" x2="191" y2="68" stroke="#c62828" stroke-width="1" stroke-dasharray="3,2"/>
  <rect x="192" y="40" width="54" height="28" rx="2" fill="#ffcccc" stroke="#cc4444" stroke-width="2"/>
  <text x="219" y="58" text-anchor="middle" font-size="10" font-weight="bold" fill="#882222" class="mf">X₁</text>
  <rect x="248" y="40" width="54" height="28" rx="2" fill="#ddeeff" stroke="#5577cc" stroke-width="1"/>
  <text x="275" y="58" text-anchor="middle" font-size="10" fill="#335599" class="mf">Y₁</text>
  <rect x="304" y="40" width="54" height="28" rx="2" fill="#ddffee" stroke="#44aa66" stroke-width="1"/>
  <text x="331" y="58" text-anchor="middle" font-size="10" fill="#226644" class="mf">Z₁</text>

  <!-- Struct 2 -->
  <line x1="359" y1="40" x2="359" y2="68" stroke="#c62828" stroke-width="1" stroke-dasharray="3,2"/>
  <rect x="360" y="40" width="54" height="28" rx="2" fill="#ffcccc" stroke="#cc4444" stroke-width="2"/>
  <text x="387" y="58" text-anchor="middle" font-size="10" font-weight="bold" fill="#882222" class="mf">X₂</text>
  <rect x="416" y="40" width="54" height="28" rx="2" fill="#ddeeff" stroke="#5577cc" stroke-width="1"/>
  <text x="443" y="58" text-anchor="middle" font-size="10" fill="#335599" class="mf">Y₂</text>
  <rect x="472" y="40" width="54" height="28" rx="2" fill="#ddffee" stroke="#44aa66" stroke-width="1"/>
  <text x="499" y="58" text-anchor="middle" font-size="10" fill="#226644" class="mf">Z₂</text>

  <!-- Struct 3 -->
  <line x1="527" y1="40" x2="527" y2="68" stroke="#c62828" stroke-width="1" stroke-dasharray="3,2"/>
  <rect x="528" y="40" width="54" height="28" rx="2" fill="#ffcccc" stroke="#cc4444" stroke-width="2"/>
  <text x="555" y="58" text-anchor="middle" font-size="10" font-weight="bold" fill="#882222" class="mf">X₃</text>
  <rect x="584" y="40" width="54" height="28" rx="2" fill="#ddeeff" stroke="#5577cc" stroke-width="1"/>
  <text x="611" y="58" text-anchor="middle" font-size="10" fill="#335599" class="mf">Y₃</text>
  <rect x="640" y="40" width="54" height="28" rx="2" fill="#ddffee" stroke="#44aa66" stroke-width="1"/>
  <text x="667" y="58" text-anchor="middle" font-size="10" fill="#226644" class="mf">Z₃</text>

  <!-- Cache line bracket (all 12 cells) -->
  <line x1="24"  y1="73" x2="24"  y2="79" stroke="#555" stroke-width="1.2"/>
  <line x1="24"  y1="76" x2="694" y2="76" stroke="#555" stroke-width="1.2"/>
  <line x1="694" y1="73" x2="694" y2="79" stroke="#555" stroke-width="1.2"/>
  <text x="359" y="89" text-anchor="middle" font-size="9" fill="#444" class="sf">← 12 float × 4 byte = 48 byte — 1 önbellek satırına sığar →</text>

  <!-- SIMD skip annotation -->
  <text x="359" y="109" text-anchor="middle" font-size="9" fill="#c62828" class="sf">SIMD X erişimi: X₀→X₁ arası stride = 12 byte (Y,Z atlanıyor) → gather operasyonu gerekir, %33 bant genişliği kullanımı</text>

  <!-- ===== SoA Panel ===== -->
  <rect x="8" y="122" width="704" height="170" rx="4" fill="#f5fff8" stroke="#44aa66" stroke-width="1.2"/>
  <text x="360" y="135" text-anchor="middle" font-size="11" font-weight="bold" fill="#2e7d32" class="sf">SoA — Structure of Arrays   (Dizilerin Yapısı)</text>

  <!-- Row labels -->
  <text x="24" y="164" text-anchor="middle" font-size="10" font-weight="bold" fill="#882222" class="mf">X[ ]</text>
  <text x="24" y="214" text-anchor="middle" font-size="10" fill="#335599" class="mf">Y[ ]</text>
  <text x="24" y="254" text-anchor="middle" font-size="10" fill="#226644" class="mf">Z[ ]</text>

  <!-- X row (y=150, h=28) — highlighted -->
  <rect x="55"  y="150" width="54" height="28" rx="2" fill="#ffcccc" stroke="#cc4444" stroke-width="2"/>
  <text x="82"  y="168" text-anchor="middle" font-size="10" font-weight="bold" fill="#882222" class="mf">X₀</text>
  <rect x="111" y="150" width="54" height="28" rx="2" fill="#ffcccc" stroke="#cc4444" stroke-width="2"/>
  <text x="138" y="168" text-anchor="middle" font-size="10" font-weight="bold" fill="#882222" class="mf">X₁</text>
  <rect x="167" y="150" width="54" height="28" rx="2" fill="#ffcccc" stroke="#cc4444" stroke-width="2"/>
  <text x="194" y="168" text-anchor="middle" font-size="10" font-weight="bold" fill="#882222" class="mf">X₂</text>
  <rect x="223" y="150" width="54" height="28" rx="2" fill="#ffcccc" stroke="#cc4444" stroke-width="2"/>
  <text x="250" y="168" text-anchor="middle" font-size="10" font-weight="bold" fill="#882222" class="mf">X₃</text>

  <!-- Cache line bracket under X row -->
  <line x1="55"  y1="182" x2="55"  y2="188" stroke="#c62828" stroke-width="1.5"/>
  <line x1="55"  y1="185" x2="277" y2="185" stroke="#c62828" stroke-width="1.5"/>
  <line x1="277" y1="182" x2="277" y2="188" stroke="#c62828" stroke-width="1.5"/>
  <text x="166" y="198" text-anchor="middle" font-size="9" fill="#c62828" class="sf">← 4 × 4 = 16 byte, unit-stride →</text>

  <!-- Y row (y=205, h=28) — dimmed -->
  <rect x="55"  y="205" width="54" height="28" rx="2" fill="#e8f0ff" stroke="#8899cc" stroke-width="1"/>
  <text x="82"  y="223" text-anchor="middle" font-size="10" fill="#5566aa" class="mf">Y₀</text>
  <rect x="111" y="205" width="54" height="28" rx="2" fill="#e8f0ff" stroke="#8899cc" stroke-width="1"/>
  <text x="138" y="223" text-anchor="middle" font-size="10" fill="#5566aa" class="mf">Y₁</text>
  <rect x="167" y="205" width="54" height="28" rx="2" fill="#e8f0ff" stroke="#8899cc" stroke-width="1"/>
  <text x="194" y="223" text-anchor="middle" font-size="10" fill="#5566aa" class="mf">Y₂</text>
  <rect x="223" y="205" width="54" height="28" rx="2" fill="#e8f0ff" stroke="#8899cc" stroke-width="1"/>
  <text x="250" y="223" text-anchor="middle" font-size="10" fill="#5566aa" class="mf">Y₃</text>

  <!-- Z row (y=245, h=28) — dimmed -->
  <rect x="55"  y="245" width="54" height="28" rx="2" fill="#e8fff2" stroke="#88ccaa" stroke-width="1"/>
  <text x="82"  y="263" text-anchor="middle" font-size="10" fill="#337755" class="mf">Z₀</text>
  <rect x="111" y="245" width="54" height="28" rx="2" fill="#e8fff2" stroke="#88ccaa" stroke-width="1"/>
  <text x="138" y="263" text-anchor="middle" font-size="10" fill="#337755" class="mf">Z₁</text>
  <rect x="167" y="245" width="54" height="28" rx="2" fill="#e8fff2" stroke="#88ccaa" stroke-width="1"/>
  <text x="194" y="263" text-anchor="middle" font-size="10" fill="#337755" class="mf">Z₂</text>
  <rect x="223" y="245" width="54" height="28" rx="2" fill="#e8fff2" stroke="#88ccaa" stroke-width="1"/>
  <text x="250" y="263" text-anchor="middle" font-size="10" fill="#337755" class="mf">Z₃</text>

  <!-- SoA annotation -->
  <text x="360" y="284" text-anchor="middle" font-size="9" fill="#2e7d32" class="sf">X₀–X₃ ardışık: tek SIMD yüklemesiyle işlenebilir — %100 bant genişliği kullanımı</text>

  <!-- Comparison callout on the right side of SoA -->
  <rect x="310" y="148" width="390" height="52" rx="3" fill="white" fill-opacity="0.85" stroke="#aaa" stroke-width="0.8"/>
  <text x="318" y="162" font-size="9" fill="#c62828" class="sf">AoS: X erişimi için stride = 3 (X₀, X₁, X₂, X₃ ardışık değil)</text>
  <text x="318" y="175" font-size="9" fill="#2e7d32" class="sf">SoA: X erişimi için stride = 1 (her X bir sonrakini izler)</text>
  <text x="318" y="188" font-size="9" fill="#555" class="sf">Büyük veri setlerinde SoA; karma erişimde AoSoA tercih edilir.</text>
</svg>
