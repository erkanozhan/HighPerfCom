    <text x="350" y="182" text-anchor="middle" fill="#2c3e50" font-size="9">Giris: /veri/egitim.csv</text>
    <text x="350" y="196" text-anchor="middle" fill="#7f8c8d" font-size="9">master: local[4]  |  sinif: label</text>
    <text x="350" y="208" text-anchor="middle" fill="#7f8c8d" font-size="9">Cikis: /veri/header</text>
  </g>
  <!-- Connection port right -->
  <circle cx="453" cy="182" r="5" fill="#2e6da4" stroke="white" stroke-width="1.5"/>

  <!-- success arrow 1 -> 2 -->
  <line x1="458" y1="182" x2="495" y2="182" stroke="#27ae60" stroke-width="2" marker-end="url(#arr-g)"/>
  <text x="477" y="174" text-anchor="middle" fill="#27ae60" font-size="9" font-weight="bold">success</text>

  <!-- Component 2: RandomizedDataChunk -->
  <g filter="url(#sh)">
