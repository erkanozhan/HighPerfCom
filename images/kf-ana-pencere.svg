    <text x="600" y="486" text-anchor="middle" fill="#7f8c8d" font-size="9">Siniflandirici: RandomForest  -I 100</text>
    <text x="600" y="500" text-anchor="middle" fill="#7f8c8d" font-size="9">Cikis: /veri/degerlendirme</text>
  </g>

  <!-- Log area at bottom of canvas -->
  <rect x="225" y="560" width="695" height="50" fill="#2c3e50" rx="0"/>
  <text x="235" y="576" fill="#2ecc71" font-size="10" font-family="Courier New, monospace">INFO: Starting Weka Spark job...</text>
  <text x="235" y="592" fill="#bdc3c7" font-size="10" font-family="Courier New, monospace">INFO: CSVToARFFHeaderSparkJob completed in 4.2s | Partitions: 16</text>
  <text x="235" y="607" fill="#bdc3c7" font-size="10" font-family="Courier New, monospace">INFO: WekaClassifierSparkJob — training RandomForest on 16 partitions...</text>

  <!-- Status bar -->
  <rect x="0" y="610" width="920" height="30" fill="#ecf0f1" stroke="#bdc3c7" stroke-width="0.5"/>
  <text x="14" y="628" fill="#636e72" font-size="10">Hazir  |  Bilesен: 4  |  Baglanti: 3  |  spark-akis-v1.kfml</text>
