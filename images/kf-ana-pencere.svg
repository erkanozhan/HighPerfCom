  <!-- ═══ WORKFLOW COMPONENTS ON CANVAS ═══ -->

  <!-- Component 1: CSVToARFFHeader -->
  <g filter="url(#sh)">
    <rect x="248" y="148" width="205" height="68" rx="6" fill="white" stroke="#2e6da4" stroke-width="2"/>
    <rect x="248" y="148" width="205" height="22" rx="6" fill="#2e6da4"/>
    <rect x="248" y="162" width="205" height="8" fill="#2e6da4"/>
