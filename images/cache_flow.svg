<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 500" font-family="Arial, sans-serif">
    <rect width="600" height="500" fill="#f8f9fa"/>
    
    <defs>
        <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
            <path d="M0,0 L0,6 L9,3 z" fill="#7f8c8d" />
        </marker>
        <marker id="arrow-green" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
            <path d="M0,0 L0,6 L9,3 z" fill="#27ae60" />
        </marker>
        <marker id="arrow-red" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
            <path d="M0,0 L0,6 L9,3 z" fill="#c0392b" />
        </marker>
    </defs>

    <rect x="200" y="30" width="200" height="50" rx="25" fill="#f5b041" stroke="#e67e22" stroke-width="2"/>
    <text x="300" y="55" font-size="14" font-weight="bold" fill="#2c3e50" text-anchor="middle">İşlemci (CPU) Veri Talep Eder</text>

    <line x1="300" y1="80" x2="300" y2="120" stroke="#7f8c8d" stroke-width="2" marker-end="url(#arrow)"/>

    <polygon points="300,120 420,170 300,220 180,170" fill="#aed6f1" stroke="#3498db" stroke-width="2"/>
    <text x="300" y="165" font-size="14" font-weight="bold" fill="#2c3e50" text-anchor="middle">Veri Önbellekte</text>
    <text x="300" y="185" font-size="14" font-weight="bold" fill="#2c3e50" text-anchor="middle">(Cache) var mı?</text>

    <path d="M 180 170 L 100 170 L 100 250" fill="none" stroke="#27ae60" stroke-width="3" marker-end="url(#arrow-green)"/>
    <text x="140" y="160" font-size="14" font-weight="bold" fill="#27ae60" text-anchor="middle">Evet</text>

    <rect x="30" y="250" width="140" height="60" rx="8" fill="#abebc6" stroke="#2ecc71" stroke-width="2"/>
    <text x="100" y="275" font-size="14" font-weight="bold" fill="#2c3e50" text-anchor="middle">Cache Hit</text>
    <text x="100" y="295" font-size="12" fill="#2c3e50" text-anchor="middle">(Hızlı Erişim)</text>

    <path d="M 420 170 L 500 170 L 500 250" fill="none" stroke="#c0392b" stroke-width="3" marker-end="url(#arrow-red)"/>
    <text x="460" y="160" font-size="14" font-weight="bold" fill="#c0392b" text-anchor="middle">Hayır</text>

    <rect x="430" y="250" width="140" height="60" rx="8" fill="#f5cba7" stroke="#e67e22" stroke-width="2"/>
    <text x="500" y="275" font-size="14" font-weight="bold" fill="#2c3e50" text-anchor="middle">Cache Miss</text>
    <text x="500" y="295" font-size="12" fill="#2c3e50" text-anchor="middle">(Zaman Kaybı)</text>

    <line x1="500" y1="310" x2="500" y2="350" stroke="#7f8c8d" stroke-width="2" marker-end="url(#arrow)"/>

    <rect x="410" y="350" width="180" height="60" rx="8" fill="#ecf0f1" stroke="#bdc3c7" stroke-width="2"/>
    <text x="500" y="375" font-size="14" font-weight="bold" fill="#2c3e50" text-anchor="middle">Veri RAM'den Getirilir</text>
    <text x="500" y="395" font-size="12" fill="#2c3e50" text-anchor="middle">ve Önbelleğe Kopyalanır</text>

    <path d="M 100 310 L 100 450 L 190 450" fill="none" stroke="#7f8c8d" stroke-width="2" marker-end="url(#arrow)"/>
    <path d="M 410 380 L 300 380 L 300 420" fill="none" stroke="#7f8c8d" stroke-width="2" marker-end="url(#arrow)"/>

    <rect x="200" y="420" width="200" height="50" rx="25" fill="#3498db" stroke="#2980b9" stroke-width="2"/>
    <text x="300" y="450" font-size="14" font-weight="bold" fill="#fff" text-anchor="middle">Veri İşlemciye (CPU) İletilir</text>

</svg>
