<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 870 245" font-family="'Segoe UI', Arial, sans-serif">
  <defs>
    <marker id="arr" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#555"/>
    </marker>
    <marker id="arr-red" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#c00"/>
    </marker>
  </defs>
  <rect width="870" height="245" fill="#f5f5f7" rx="12"/>
  <text x="435" y="32" text-anchor="middle" font-size="15" font-weight="bold" fill="#1a1a2e">RDD Dönüşüm Zinciri (RDD Transformation Lineage)</text>

  <!-- Source file -->
  <rect x="15" y="72" width="110" height="72" rx="7" fill="#455a64" stroke="#263238" stroke-width="1.5"/>
  <text x="70" y="99" text-anchor="middle" fill="white" font-size="12" font-weight="bold">Dosya</text>
  <text x="70" y="116" text-anchor="middle" fill="#cfd8dc" font-size="10">ARFF / CSV</text>
  <text x="70" y="132" text-anchor="middle" fill="#90a4ae" font-size="9">Disk veya HDFS</text>

  <line x1="125" y1="108" x2="153" y2="108" stroke="#555" stroke-width="1.8" marker-end="url(#arr)"/>
  <text x="139" y="101" text-anchor="middle" fill="#555" font-size="9">textFile()</text>

  <!-- RDD[String] -->
  <rect x="155" y="72" width="130" height="72" rx="7" fill="#2e6da4" stroke="#1a4a7a" stroke-width="1.5"/>
  <text x="220" y="98" text-anchor="middle" fill="white" font-size="12" font-weight="bold">RDD[String]</text>
  <text x="220" y="115" text-anchor="middle" fill="#c8ddff" font-size="10">Ham satırlar</text>
  <text x="220" y="131" text-anchor="middle" fill="#9fbdee" font-size="9">(tembel / lazy)</text>

  <line x1="285" y1="108" x2="313" y2="108" stroke="#555" stroke-width="1.8" marker-end="url(#arr)"/>
  <text x="299" y="101" text-anchor="middle" fill="#555" font-size="9">map(parse)</text>

  <!-- RDD[Instance] -->
  <rect x="315" y="72" width="140" height="72" rx="7" fill="#2e6da4" stroke="#1a4a7a" stroke-width="1.5"/>
  <text x="385" y="98" text-anchor="middle" fill="white" font-size="12" font-weight="bold">RDD[Instance]</text>
  <text x="385" y="115" text-anchor="middle" fill="#c8ddff" font-size="10">Weka örnekleri</text>
  <text x="385" y="131" text-anchor="middle" fill="#9fbdee" font-size="9">(ayrıştırılmış)</text>

  <line x1="455" y1="108" x2="483" y2="108" stroke="#555" stroke-width="1.8" marker-end="url(#arr)"/>
  <text x="469" y="101" text-anchor="middle" fill="#555" font-size="9">filter()</text>

  <!-- RDD[Instance] filtered -->
  <rect x="485" y="72" width="140" height="72" rx="7" fill="#2e6da4" stroke="#1a4a7a" stroke-width="1.5"/>
  <text x="555" y="98" text-anchor="middle" fill="white" font-size="12" font-weight="bold">RDD[Instance]</text>
  <text x="555" y="115" text-anchor="middle" fill="#c8ddff" font-size="10">Filtrelenmiş</text>
  <text x="555" y="131" text-anchor="middle" fill="#9fbdee" font-size="9">(eksikler çıkarıldı)</text>

  <line x1="625" y1="108" x2="653" y2="108" stroke="#555" stroke-width="1.8" marker-end="url(#arr)"/>
  <text x="639" y="99" text-anchor="middle" fill="#555" font-size="8">mapPartitions</text>
  <text x="639" y="110" text-anchor="middle" fill="#555" font-size="8">(trainModel)</text>

  <!-- RDD[Classifier] -->
  <rect x="655" y="72" width="140" height="72" rx="7" fill="#c8622a" stroke="#8a3f10" stroke-width="1.5"/>
  <text x="725" y="97" text-anchor="middle" fill="white" font-size="12" font-weight="bold">RDD[Classifier]</text>
  <text x="725" y="114" text-anchor="middle" fill="#ffe0c8" font-size="10">Bölüm başına</text>
  <text x="725" y="130" text-anchor="middle" fill="#ffe0c8" font-size="10">bir model</text>

  <!-- Action trigger -->
  <line x1="725" y1="144" x2="725" y2="172" stroke="#c00" stroke-width="2" marker-end="url(#arr-red)"/>
  <text x="738" y="162" fill="#c00" font-size="10" font-weight="bold">collect()</text>

  <!-- Action box -->
  <rect x="655" y="174" width="140" height="40" rx="7" fill="#6a3d9a" stroke="#3d1a6a" stroke-width="1.5"/>
  <text x="725" y="192" text-anchor="middle" fill="white" font-size="11" font-weight="bold">Action</text>
  <text x="725" y="207" text-anchor="middle" fill="#ddc8ff" font-size="10">Hesaplama başlar</text>

  <!-- Note -->
  <rect x="15" y="168" width="620" height="50" rx="7" fill="#fffbea" stroke="#e0c840" stroke-width="1"/>
  <text x="325" y="188" text-anchor="middle" fill="#555" font-size="11" font-weight="bold">Tembel Değerlendirme (Lazy Evaluation):</text>
  <text x="325" y="207" text-anchor="middle" fill="#777" font-size="10">map, filter gibi transformasyonlar bir Action çağrısına kadar gerçekten çalışmaz; yalnızca plan kaydedilir.</text>
</svg>
