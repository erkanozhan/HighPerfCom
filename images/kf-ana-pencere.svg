  <rect x="12" y="348" width="209" height="22" rx="3" fill="#eaf0fb" stroke="#a9b9d0"/>
  <text x="22" y="363" fill="#2c3e50" font-size="10">RandomizedDataChunkSparkJob</text>

  <!-- Highlighted item (currently selected) -->
  <rect x="12" y="374" width="209" height="22" rx="3" fill="#1a4a8a" stroke="#0a2a5a" stroke-width="1.5"/>
  <text x="22" y="389" fill="white" font-size="10" font-weight="bold">WekaClassifierSparkJob</text>

