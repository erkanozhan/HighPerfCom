<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 340" font-family="'Segoe UI', Arial, sans-serif">
  <defs>
    <marker id="arr-g" markerWidth="9" markerHeight="7" refX="8" refY="3.5" orient="auto">
      <polygon points="0 0, 9 3.5, 0 7" fill="#27ae60"/>
    </marker>
    <filter id="sh" x="-6%" y="-6%" width="116%" height="116%">
      <feDropShadow dx="1" dy="2" stdDeviation="4" flood-opacity="0.18"/>
    </filter>
  </defs>
  <rect width="820" height="340" fill="#eef1f5" rx="12"/>
  <text x="410" y="28" text-anchor="middle" font-size="14" font-weight="bold" fill="#1a1a2e">Knowledge Flow: ARFF Başlığı Oluşturma Akışı</text>
  <text x="410" y="46" text-anchor="middle" font-size="10" fill="#7f8c8d">Spark Şablon Akışı — küme kurulumu gerekmez, yerel modda çalışır</text>

  <!-- CSV source annotation -->
  <rect x="30" y="70" width="160" height="55" rx="6" fill="#455a64" stroke="#263238" stroke-width="1.5"/>
  <text x="110" y="92" text-anchor="middle" fill="white" font-size="11" font-weight="bold">hypothyroid.csv</text>
  <text x="110" y="108" text-anchor="middle" fill="#cfd8dc" font-size="9">Başlık satırı yok</text>
  <text x="110" y="120" text-anchor="middle" fill="#90a4ae" font-size="9">sample_data/ dizininde</text>

  <!-- Arrow: CSV -> Job -->
  <line x1="190" y1="97" x2="230" y2="97" stroke="#888" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arr-g)"/>
  <text x="210" y="90" text-anchor="middle" fill="#888" font-size="9">giriş</text>

  <!-- ArffHeaderSparkJob -->
  <g filter="url(#sh)">
    <rect x="232" y="62" width="240" height="72" rx="8" fill="white" stroke="#2e6da4" stroke-width="2.5"/>
    <rect x="232" y="62" width="240" height="24" rx="8" fill="#2e6da4"/>
    <rect x="232" y="78" width="240" height="8" fill="#2e6da4"/>
    <text x="352" y="80" text-anchor="middle" fill="white" font-size="11" font-weight="bold">ArffHeaderSparkJob</text>
    <text x="352" y="100" text-anchor="middle" fill="#2c3e50" font-size="10">CSV dosyasını Spark ile tarar</text>
    <text x="352" y="115" text-anchor="middle" fill="#7f8c8d" font-size="9">Öznitelik türleri + özet istatistikler</text>
    <text x="352" y="128" text-anchor="middle" fill="#7f8c8d" font-size="9">master: local[*]</text>
  </g>

  <!-- dataset connection arrow -->
  <line x1="472" y1="98" x2="530" y2="98" stroke="#27ae60" stroke-width="2" marker-end="url(#arr-g)"/>
  <text x="501" y="90" text-anchor="middle" fill="#27ae60" font-size="9" font-weight="bold">dataset</text>

  <!-- TextViewer -->
  <g filter="url(#sh)">
    <rect x="532" y="62" width="200" height="72" rx="8" fill="white" stroke="#6a3d9a" stroke-width="2"/>
    <rect x="532" y="62" width="200" height="24" rx="8" fill="#6a3d9a"/>
    <rect x="532" y="78" width="200" height="8" fill="#6a3d9a"/>
    <text x="632" y="80" text-anchor="middle" fill="white" font-size="11" font-weight="bold">TextViewer</text>
    <text x="632" y="100" text-anchor="middle" fill="#2c3e50" font-size="10">ARFF başlığını gösterir</text>
    <text x="632" y="115" text-anchor="middle" fill="#7f8c8d" font-size="9">+ Özet istatistikler</text>
    <text x="632" y="128" text-anchor="middle" fill="#7f8c8d" font-size="9">Sağ tık → Show results</text>
  </g>

  <!-- Output annotation box -->
  <rect x="30" y="165" width="760" height="158" rx="8" fill="white" stroke="#bdc3c7" stroke-width="1"/>
  <rect x="30" y="165" width="760" height="22" rx="8" fill="#2c3e50"/>
  <rect x="30" y="179" width="760" height="8" fill="#2c3e50"/>
  <text x="410" y="180" text-anchor="middle" fill="white" font-size="10" font-weight="bold">TextViewer Çıktısı — ARFF başlığı + özet istatistikler</text>

  <!-- ARFF output content -->
  <text x="50" y="206" fill="#2e7d32" font-size="10" font-family="'Courier New', monospace" font-weight="bold">@relation hypothyroid</text>
  <text x="50" y="220" fill="#2c3e50" font-size="10" font-family="'Courier New', monospace">@attribute age NUMERIC</text>
  <text x="50" y="234" fill="#2c3e50" font-size="10" font-family="'Courier New', monospace">@attribute sex {F,M}</text>
  <text x="50" y="248" fill="#7f8c8d" font-size="10" font-family="'Courier New', monospace">... (30 öznitelik) ...</text>
  <text x="50" y="262" fill="#2c3e50" font-size="10" font-family="'Courier New', monospace">@attribute Class {negative,compensated_hypothyroid,primary_hypothyroid,secondary_hypothyroid}</text>

  <!-- Divider -->
  <line x1="45" y1="272" x2="775" y2="272" stroke="#ecf0f1" stroke-width="1"/>

  <!-- Summary stats -->
  <text x="50" y="287" fill="#c8622a" font-size="10" font-family="'Courier New', monospace">% --- Ozet Istatistikler (Summary Statistics) ---</text>
  <text x="50" y="301" fill="#7f8c8d" font-size="10" font-family="'Courier New', monospace">% age_count=3772  age_min=1  age_max=92  age_mean=41.4  age_stddev=21.5</text>
  <text x="50" y="315" fill="#7f8c8d" font-size="10" font-family="'Courier New', monospace">% Class_negative=3481  Class_compensated_hypothyroid=194  Class_primary_hypothyroid=95  Class_secondary_hypothyroid=2</text>
</svg>
