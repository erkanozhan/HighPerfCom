<svg xmlns="http://www.w3.org/2000/svg" width="720" height="250" viewBox="0 0 720 250">
  <defs>
    <style>.sf{font-family:'Segoe UI',Helvetica,Arial,sans-serif}.mf{font-family:'Consolas','Courier New',monospace}</style>
    <marker id="ah" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
      <path d="M0 0 L6 3 L0 6 Z" fill="#555"/>
    </marker>
    <marker id="ahr" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
      <path d="M0 0 L6 3 L0 6 Z" fill="#c62828"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="360" y="17" text-anchor="middle" font-size="12" font-weight="bold" fill="#1a252f" class="sf">Önbellek Iskalama Türleri — 3C Kuralı (Three C's of Cache Misses)</text>

  <!-- ===== Panel 1: Compulsory ===== -->
  <rect x="10" y="24" width="224" height="218" rx="5" fill="#e8f4fd" stroke="#1565c0" stroke-width="1.5"/>
  <rect x="10" y="24" width="224" height="32" rx="5" fill="#1565c0"/>
  <text x="122" y="40" text-anchor="middle" font-size="11" font-weight="bold" fill="white" class="sf">Compulsory (Zorunlu)</text>
  <text x="122" y="53" text-anchor="middle" font-size="9" fill="#bbdefb" class="sf">Soğuk Başlangıç — Cold Start Miss</text>

  <!-- Cache slots: empty -->
  <text x="57" y="73" text-anchor="middle" font-size="9" font-weight="bold" fill="#1565c0" class="sf">Önbellek</text>
  <rect x="28" y="78" width="58" height="18" rx="2" fill="white" stroke="#90caf9" stroke-width="1"/>
  <text x="57" y="91" text-anchor="middle" font-size="8.5" fill="#bbb" class="sf">boş</text>
  <rect x="28" y="100" width="58" height="18" rx="2" fill="white" stroke="#90caf9" stroke-width="1"/>
  <text x="57" y="113" text-anchor="middle" font-size="8.5" fill="#bbb" class="sf">boş</text>
  <rect x="28" y="122" width="58" height="18" rx="2" fill="white" stroke="#90caf9" stroke-width="1"/>
  <text x="57" y="135" text-anchor="middle" font-size="8.5" fill="#bbb" class="sf">boş</text>
  <rect x="28" y="144" width="58" height="18" rx="2" fill="white" stroke="#90caf9" stroke-width="1"/>
  <text x="57" y="157" text-anchor="middle" font-size="8.5" fill="#bbb" class="sf">boş</text>

  <!-- Incoming block arrow: miss -->
  <text x="165" y="108" text-anchor="middle" font-size="9" fill="#555" class="mf">Blok A</text>
  <text x="165" y="120" text-anchor="middle" font-size="9" fill="#555" class="sf">(ilk erişim)</text>
  <line x1="140" y1="118" x2="90" y2="118" stroke="#c62828" stroke-width="1.5" stroke-dasharray="3,2" marker-end="url(#ahr)"/>
  <text x="205" y="108" font-size="13" font-weight="bold" fill="#c62828" class="mf">✗</text>

  <!-- Divider -->
  <line x1="18" y1="172" x2="226" y2="172" stroke="#90caf9" stroke-width="0.8"/>
  <text x="122" y="186" text-anchor="middle" font-size="9" fill="#1a237e" class="sf">Veriye ilk kez erişimde önceden</text>
  <text x="122" y="198" text-anchor="middle" font-size="9" fill="#1a237e" class="sf">önbellekte olması imkânsızdır.</text>
  <text x="122" y="213" text-anchor="middle" font-size="9" fill="#555" class="sf">⟶ Azaltma: prefetching</text>
  <text x="122" y="227" text-anchor="middle" font-size="9" fill="#555" class="sf">⟶ Hafifletme: sıralı (sequential) erişim</text>

  <!-- ===== Panel 2: Capacity ===== -->
  <rect x="248" y="24" width="224" height="218" rx="5" fill="#fff3e0" stroke="#e65100" stroke-width="1.5"/>
  <rect x="248" y="24" width="224" height="32" rx="5" fill="#e65100"/>
  <text x="360" y="40" text-anchor="middle" font-size="11" font-weight="bold" fill="white" class="sf">Capacity (Kapasite)</text>
  <text x="360" y="53" text-anchor="middle" font-size="9" fill="#ffe0b2" class="sf">Çalışma Seti Taşması — Working Set Miss</text>

  <!-- Cache slots: full -->
  <text x="295" y="73" text-anchor="middle" font-size="9" font-weight="bold" fill="#e65100" class="sf">Önbellek (dolu)</text>
  <rect x="266" y="78" width="58" height="18" rx="2" fill="#ffe0b2" stroke="#e65100" stroke-width="1"/>
  <text x="295" y="91" text-anchor="middle" font-size="9" fill="#bf360c" class="mf">A</text>
  <rect x="266" y="100" width="58" height="18" rx="2" fill="#ffe0b2" stroke="#e65100" stroke-width="1"/>
  <text x="295" y="113" text-anchor="middle" font-size="9" fill="#bf360c" class="mf">B</text>
  <rect x="266" y="122" width="58" height="18" rx="2" fill="#ffe0b2" stroke="#e65100" stroke-width="1"/>
  <text x="295" y="135" text-anchor="middle" font-size="9" fill="#bf360c" class="mf">C</text>
  <rect x="266" y="144" width="58" height="18" rx="2" fill="#ffe0b2" stroke="#e65100" stroke-width="1"/>
  <text x="295" y="157" text-anchor="middle" font-size="9" fill="#bf360c" class="mf">D</text>

  <!-- New block E pushes out A -->
  <text x="400" y="108" text-anchor="middle" font-size="9" fill="#555" class="mf">Blok E</text>
  <text x="400" y="120" text-anchor="middle" font-size="9" fill="#555" class="sf">(çalışma setinden)</text>
  <line x1="375" y1="118" x2="328" y2="118" stroke="#c62828" stroke-width="1.5" stroke-dasharray="3,2" marker-end="url(#ahr)"/>
  <!-- A evicted -->
  <line x1="266" y1="87" x2="252" y2="87" stroke="#888" stroke-width="1" marker-end="url(#ah)"/>
  <text x="245" y="91" text-anchor="end" font-size="8" fill="#888" class="sf">evict</text>
  <text x="445" y="112" font-size="13" font-weight="bold" fill="#c62828" class="mf">✗</text>

  <!-- Divider -->
  <line x1="256" y1="172" x2="464" y2="172" stroke="#ffcc80" stroke-width="0.8"/>
  <text x="360" y="186" text-anchor="middle" font-size="9" fill="#bf360c" class="sf">Çalışma seti önbellek boyutunu</text>
  <text x="360" y="198" text-anchor="middle" font-size="9" fill="#bf360c" class="sf">aştığında bloklar defalarca atılır.</text>
  <text x="360" y="213" text-anchor="middle" font-size="9" fill="#555" class="sf">⟶ Azaltma: döngü bloklama (tiling)</text>
  <text x="360" y="227" text-anchor="middle" font-size="9" fill="#555" class="sf">⟶ Azaltma: çalışma setini küçültmek</text>

  <!-- ===== Panel 3: Conflict ===== -->
  <rect x="486" y="24" width="224" height="218" rx="5" fill="#fce4ec" stroke="#c62828" stroke-width="1.5"/>
  <rect x="486" y="24" width="224" height="32" rx="5" fill="#c62828"/>
  <text x="598" y="40" text-anchor="middle" font-size="11" font-weight="bold" fill="white" class="sf">Conflict (Çakışma)</text>
  <text x="598" y="53" text-anchor="middle" font-size="9" fill="#ffcdd2" class="sf">Adres Çakışması — Thrashing</text>

  <!-- Cache set 0 highlighted -->
  <text x="531" y="73" text-anchor="middle" font-size="9" font-weight="bold" fill="#c62828" class="sf">Set 0 (direkt eşlem)</text>
  <rect x="504" y="78" width="58" height="18" rx="2" fill="#ffcdd2" stroke="#c62828" stroke-width="2"/>
  <text x="533" y="91" text-anchor="middle" font-size="9" fill="#b71c1c" class="mf">A</text>
  <rect x="504" y="100" width="58" height="18" rx="2" fill="white" stroke="#aaa" stroke-width="1"/>
  <text x="533" y="113" text-anchor="middle" font-size="8" fill="#bbb" class="sf">boş</text>
  <rect x="504" y="122" width="58" height="18" rx="2" fill="white" stroke="#aaa" stroke-width="1"/>
  <text x="533" y="135" text-anchor="middle" font-size="8" fill="#bbb" class="sf">boş</text>
  <rect x="504" y="144" width="58" height="18" rx="2" fill="white" stroke="#aaa" stroke-width="1"/>
  <text x="533" y="157" text-anchor="middle" font-size="8" fill="#bbb" class="sf">boş</text>

  <!-- Two addresses mapping to same set -->
  <text x="625" y="87" font-size="9" fill="#555" class="mf">A → Set 0</text>
  <line x1="617" y1="84" x2="564" y2="87" stroke="#555" stroke-width="1" marker-end="url(#ah)"/>
  <text x="625" y="105" font-size="9" font-weight="bold" fill="#c62828" class="mf">B → Set 0</text>
  <line x1="617" y1="102" x2="564" y2="97" stroke="#c62828" stroke-width="1.5" marker-end="url(#ahr)"/>
  <text x="598" y="130" text-anchor="middle" font-size="9" fill="#c62828" class="sf">B, A'yı atıyor (evict)</text>
  <text x="598" y="143" text-anchor="middle" font-size="9" fill="#c62828" class="sf">A tekrar lazım → tekrar miss!</text>
  <text x="598" y="156" text-anchor="middle" font-size="9" fill="#c62828" class="sf">→ thrashing</text>

  <!-- Divider -->
  <line x1="494" y1="172" x2="702" y2="172" stroke="#ef9a9a" stroke-width="0.8"/>
  <text x="598" y="186" text-anchor="middle" font-size="9" fill="#b71c1c" class="sf">Farklı adresler aynı önbellek</text>
  <text x="598" y="198" text-anchor="middle" font-size="9" fill="#b71c1c" class="sf">konumuna eşlenerek birbirini atar.</text>
  <text x="598" y="213" text-anchor="middle" font-size="9" fill="#555" class="sf">⟶ Azaltma: dizi dolgusu (padding)</text>
  <text x="598" y="227" text-anchor="middle" font-size="9" fill="#555" class="sf">⟶ Azaltma: n-yollu (n-way) önbellek</text>
</svg>
