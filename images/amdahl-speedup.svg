<svg xmlns="http://www.w3.org/2000/svg" width="720" height="430" viewBox="0 0 720 430">
  <defs>
    <style>
      .sf { font-family: 'Segoe UI', Helvetica, Arial, sans-serif; }
      .mf { font-family: 'Consolas', 'Courier New', monospace; }
    </style>
  </defs>

  <!-- Title -->
  <text x="360" y="17" text-anchor="middle" font-size="12" font-weight="bold" fill="#1a252f" class="sf">Amdahl Yasası — Farklı Seri Kesir Oranları için Hızlanma S(p)</text>
  <text x="360" y="29" text-anchor="middle" font-size="10" fill="#7f8c8d" class="sf">X ekseni log₂ ölçeğinde · Yatay kesik çizgiler teorik üst sınırı S_max = 1/r gösterir</text>

  <!-- Plot background -->
  <rect x="65" y="35" width="600" height="325" fill="#f9fafb" stroke="#bbb" stroke-width="1"/>

  <!-- Horizontal grid lines (at s = 5, 10, 15, 20, 25) -->
  <line x1="65" y1="306" x2="665" y2="306" stroke="#e5e5e5" stroke-width="1"/>
  <line x1="65" y1="252" x2="665" y2="252" stroke="#e5e5e5" stroke-width="1"/>
  <line x1="65" y1="198" x2="665" y2="198" stroke="#e5e5e5" stroke-width="1"/>
  <line x1="65" y1="143" x2="665" y2="143" stroke="#e5e5e5" stroke-width="1"/>
  <line x1="65" y1="89"  x2="665" y2="89"  stroke="#e5e5e5" stroke-width="1"/>

  <!-- Vertical grid lines (at p = 2, 4, 8, 16, 32) -->
  <line x1="165" y1="35" x2="165" y2="360" stroke="#e5e5e5" stroke-width="1"/>
  <line x1="265" y1="35" x2="265" y2="360" stroke="#e5e5e5" stroke-width="1"/>
  <line x1="365" y1="35" x2="365" y2="360" stroke="#e5e5e5" stroke-width="1"/>
  <line x1="465" y1="35" x2="465" y2="360" stroke="#e5e5e5" stroke-width="1"/>
  <line x1="565" y1="35" x2="565" y2="360" stroke="#e5e5e5" stroke-width="1"/>

  <!-- Y axis tick labels -->
  <text x="58" y="363" text-anchor="end" font-size="10" fill="#555" class="mf">0</text>
  <text x="58" y="309" text-anchor="end" font-size="10" fill="#555" class="mf">5</text>
  <text x="58" y="255" text-anchor="end" font-size="10" fill="#555" class="mf">10</text>
  <text x="58" y="201" text-anchor="end" font-size="10" fill="#555" class="mf">15</text>
  <text x="58" y="146" text-anchor="end" font-size="10" fill="#555" class="mf">20</text>
  <text x="58" y="92"  text-anchor="end" font-size="10" fill="#555" class="mf">25</text>
  <text x="58" y="38"  text-anchor="end" font-size="10" fill="#555" class="mf">30</text>

  <!-- X axis tick labels -->
  <text x="65"  y="377" text-anchor="middle" font-size="10" fill="#555" class="mf">1</text>
  <text x="165" y="377" text-anchor="middle" font-size="10" fill="#555" class="mf">2</text>
  <text x="265" y="377" text-anchor="middle" font-size="10" fill="#555" class="mf">4</text>
  <text x="365" y="377" text-anchor="middle" font-size="10" fill="#555" class="mf">8</text>
  <text x="465" y="377" text-anchor="middle" font-size="10" fill="#555" class="mf">16</text>
  <text x="565" y="377" text-anchor="middle" font-size="10" fill="#555" class="mf">32</text>
  <text x="665" y="377" text-anchor="middle" font-size="10" fill="#555" class="mf">64</text>

  <!-- Axis labels -->
  <text x="365" y="396" text-anchor="middle" font-size="11" fill="#444" class="sf">İşlemci Sayısı (p) — log₂ ölçeği</text>
  <text x="16" y="200" text-anchor="middle" font-size="11" fill="#444" class="sf" transform="rotate(-90 16 200)">Hızlanma  S(p)</text>

  <!-- Asymptote lines (faint dashed, same color as curve) -->
  <!-- r=0.50: S_max=2, y=338 -->
  <line x1="65" y1="338" x2="665" y2="338" stroke="#c62828" stroke-width="0.9" stroke-dasharray="4,3" opacity="0.45"/>
  <!-- r=0.25: S_max=4, y=317 -->
  <line x1="65" y1="317" x2="665" y2="317" stroke="#e65100" stroke-width="0.9" stroke-dasharray="4,3" opacity="0.45"/>
  <!-- r=0.10: S_max=10, y=252 — coincides with grid line at s=10 -->
  <line x1="65" y1="252" x2="665" y2="252" stroke="#2e7d32" stroke-width="0.9" stroke-dasharray="4,3" opacity="0.5"/>
  <!-- r=0.05: S_max=20, y=143 — coincides with grid line at s=20 -->
  <line x1="65" y1="143" x2="665" y2="143" stroke="#0277bd" stroke-width="0.9" stroke-dasharray="4,3" opacity="0.5"/>

  <!-- ===== CURVES ===== -->

  <!-- Ideal (r=0): gray dashed — clips at s=30 (p≈30, x=556) -->
  <polyline points="65,349 165,338 265,317 365,273 465,187 556,35"
    fill="none" stroke="#9e9e9e" stroke-width="1.5" stroke-dasharray="7,4"/>

  <!-- r=0.01: dark blue — clips at s=30 (p≈42, x=606) -->
  <polyline points="65,349 165,339 265,318 365,279 465,209 565,95 606,35"
    fill="none" stroke="#1565c0" stroke-width="2.0"/>

  <!-- r=0.05: medium blue -->
  <polyline points="65,349 165,339 265,322 365,296 465,261 565,224 665,193"
    fill="none" stroke="#0277bd" stroke-width="2.0"/>

  <!-- r=0.10: green -->
  <polyline points="65,349 165,340 265,327 365,309 465,291 565,275 665,265"
    fill="none" stroke="#2e7d32" stroke-width="2.0"/>

  <!-- r=0.25: orange -->
  <polyline points="65,349 165,343 265,335 365,328 465,324 565,320 665,319"
    fill="none" stroke="#e65100" stroke-width="2.0"/>

  <!-- r=0.50: red -->
  <polyline points="65,349 165,346 265,343 365,341 465,340 565,339 665,339"
    fill="none" stroke="#c62828" stroke-width="2.0"/>

  <!-- ===== LEGEND ===== -->
  <rect x="70" y="43" width="192" height="123" rx="4" fill="white" fill-opacity="0.93" stroke="#ccc" stroke-width="1"/>
  <text x="166" y="57" text-anchor="middle" font-size="10" font-weight="bold" fill="#333" class="sf">Seri Kesir r  /  S_max</text>

  <line x1="80" y1="70" x2="108" y2="70" stroke="#9e9e9e" stroke-width="1.5" stroke-dasharray="7,4"/>
  <text x="115" y="73" font-size="9" fill="#555" class="sf">İdeal  r = 0   → S_max = ∞</text>

  <line x1="80" y1="84" x2="108" y2="84" stroke="#1565c0" stroke-width="2"/>
  <text x="115" y="87" font-size="9" fill="#555" class="sf">r = 1%   → S_max = 100</text>

  <line x1="80" y1="98" x2="108" y2="98" stroke="#0277bd" stroke-width="2"/>
  <text x="115" y="101" font-size="9" fill="#555" class="sf">r = 5%   → S_max = 20</text>

  <line x1="80" y1="112" x2="108" y2="112" stroke="#2e7d32" stroke-width="2"/>
  <text x="115" y="115" font-size="9" fill="#555" class="sf">r = 10%  → S_max = 10</text>

  <line x1="80" y1="126" x2="108" y2="126" stroke="#e65100" stroke-width="2"/>
  <text x="115" y="129" font-size="9" fill="#555" class="sf">r = 25%  → S_max = 4</text>

  <line x1="80" y1="140" x2="108" y2="140" stroke="#c62828" stroke-width="2"/>
  <text x="115" y="143" font-size="9" fill="#555" class="sf">r = 50%  → S_max = 2</text>

  <!-- Chart bottom axis line -->
  <line x1="65" y1="360" x2="665" y2="360" stroke="#bbb" stroke-width="1"/>
</svg>
