  <circle cx="848" cy="16" r="8" fill="#2ecc71"/>
  <circle cx="872" cy="16" r="8" fill="#f39c12"/>
  <circle cx="896" cy="16" r="8" fill="#e74c3c"/>

  <!-- Menu bar -->
