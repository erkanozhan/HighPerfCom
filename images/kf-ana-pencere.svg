    <text x="599" y="196" text-anchor="middle" fill="#7f8c8d" font-size="9">Tohum (seed): 1</text>
    <text x="599" y="208" text-anchor="middle" fill="#7f8c8d" font-size="9">Cikis: /veri/karisik</text>
  </g>
  <!-- Port bottom -->
