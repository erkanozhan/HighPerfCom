    <text x="600" y="326" text-anchor="middle" fill="#2c3e50" font-size="9">Siniflandirici: RandomForest  -I 100  -K 0</text>
    <text x="600" y="340" text-anchor="middle" fill="#7f8c8d" font-size="9">Iterasyon: 16  |  master: local[4]</text>
    <text x="600" y="354" text-anchor="middle" fill="#7f8c8d" font-size="9">Cikis: /veri/model</text>
  </g>
  <!-- Port bottom -->
  <circle cx="600" cy="364" r="5" fill="#c8622a" stroke="white" stroke-width="1.5"/>

  <!-- success arrow 3 -> 4 -->
  <line x1="600" y1="369" x2="600" y2="436" stroke="#27ae60" stroke-width="2" marker-end="url(#arr-g)"/>
  <text x="617" y="405" fill="#27ae60" font-size="9" font-weight="bold">success</text>

