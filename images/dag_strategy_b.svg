<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 350" font-family="sans-serif">
  <rect width="600" height="350" fill="#ffffff"/>
  
  <defs>
    <marker id="arrowhead2" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#7f8c8d" />
    </marker>
  </defs>

  <line x1="120" y1="150" x2="240" y2="150" stroke="#e74c3c" stroke-width="3" marker-end="url(#arrowhead2)"/>
  <line x1="120" y1="240" x2="240" y2="150" stroke="#7f8c8d" stroke-width="2" marker-end="url(#arrowhead2)"/>
  
  <line x1="240" y1="150" x2="400" y2="150" stroke="#e74c3c" stroke-width="3" marker-end="url(#arrowhead2)"/>
  <line x1="300" y1="60" x2="400" y2="150" stroke="#7f8c8d" stroke-width="2" marker-end="url(#arrowhead2)"/>
  <line x1="300" y1="260" x2="400" y2="150" stroke="#7f8c8d" stroke-width="2" marker-end="url(#arrowhead2)"/>

  <circle cx="120" cy="150" r="25" fill="#3498db" />
  <text x="120" y="155" fill="#fff" font-weight="bold" text-anchor="middle">A(10)</text>

  <circle cx="120" cy="240" r="25" fill="#3498db" />
  <text x="120" y="245" fill="#fff" font-weight="bold" text-anchor="middle">B(10)</text>

  <circle cx="300" cy="60" r="25" fill="#3498db" />
  <text x="300" y="65" fill="#fff" font-weight="bold" text-anchor="middle">C(10)</text>

  <circle cx="240" cy="150" r="25" fill="#e74c3c" />
  <text x="240" y="155" fill="#fff" font-weight="bold" text-anchor="middle">D(15)</text>

  <circle cx="300" cy="260" r="25" fill="#3498db" />
  <text x="300" y="265" fill="#fff" font-weight="bold" text-anchor="middle">F(10)</text>

  <circle cx="400" cy="150" r="25" fill="#e74c3c" />
  <text x="400" y="155" fill="#fff" font-weight="bold" text-anchor="middle">E(9)</text>

  <text x="50" y="320" font-size="14" fill="#2c3e50">Toplam İş (W) = 10+10+10+15+10+9 = 64</text>
  <text x="50" y="340" font-size="14" fill="#e74c3c" font-weight="bold">Kritik Yol (L) = A(10) -> D(15) -> E(9) = 34</text>
</svg>
