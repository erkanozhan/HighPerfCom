<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 750 300" font-family="Arial, sans-serif">
    <rect width="750" height="300" fill="#f8f9fa"/>
    
    <text x="375" y="30" font-size="18" font-weight="bold" fill="#2c3e50" text-anchor="middle">Boru Hattı (Pipelining) Aşamaları</text>

    <g transform="translate(50, 60)">
        <rect x="100" y="0" width="80" height="30" fill="#d5f5e3" stroke="#bdc3c7"/>
        <text x="140" y="20" font-weight="bold" fill="#2c3e50" text-anchor="middle">t1</text>
        <rect x="180" y="0" width="80" height="30" fill="#d5f5e3" stroke="#bdc3c7"/>
        <text x="220" y="20" font-weight="bold" fill="#2c3e50" text-anchor="middle">t2</text>
        <rect x="260" y="0" width="80" height="30" fill="#d5f5e3" stroke="#bdc3c7"/>
        <text x="300" y="20" font-weight="bold" fill="#2c3e50" text-anchor="middle">t3</text>
        <rect x="340" y="0" width="80" height="30" fill="#d5f5e3" stroke="#bdc3c7"/>
        <text x="380" y="20" font-weight="bold" fill="#2c3e50" text-anchor="middle">t4</text>
        <rect x="420" y="0" width="80" height="30" fill="#d5f5e3" stroke="#bdc3c7"/>
        <text x="460" y="20" font-weight="bold" fill="#2c3e50" text-anchor="middle">t5</text>
        <rect x="500" y="0" width="80" height="30" fill="#d5f5e3" stroke="#bdc3c7"/>
        <text x="540" y="20" font-weight="bold" fill="#2c3e50" text-anchor="middle">t6</text>

        <rect x="0" y="40" width="100" height="40" fill="#ebdef0" stroke="#bdc3c7"/>
        <text x="50" y="65" font-weight="bold" fill="#2c3e50" text-anchor="middle">Komut 1</text>
        <rect x="100" y="40" width="80" height="40" fill="#3498db" stroke="#fff" stroke-width="2"/>
        <text x="140" y="65" fill="#fff" font-weight="bold" text-anchor="middle">Fetch</text>
        <rect x="180" y="40" width="80" height="40" fill="#f1c40f" stroke="#fff" stroke-width="2"/>
        <text x="220" y="65" fill="#2c3e50" font-weight="bold" text-anchor="middle">Decode</text>
        <rect x="260" y="40" width="80" height="40" fill="#e67e22" stroke="#fff" stroke-width="2"/>
        <text x="300" y="65" fill="#fff" font-weight="bold" text-anchor="middle">Execute</text>
        <rect x="340" y="40" width="80" height="40" fill="#27ae60" stroke="#fff" stroke-width="2"/>
        <text x="380" y="65" fill="#fff" font-weight="bold" text-anchor="middle">Write</text>

        <rect x="0" y="90" width="100" height="40" fill="#ebdef0" stroke="#bdc3c7"/>
        <text x="50" y="115" font-weight="bold" fill="#2c3e50" text-anchor="middle">Komut 2</text>
        <rect x="180" y="90" width="80" height="40" fill="#3498db" stroke="#fff" stroke-width="2"/>
        <text x="220" y="115" fill="#fff" font-weight="bold" text-anchor="middle">Fetch</text>
        <rect x="260" y="90" width="80" height="40" fill="#f1c40f" stroke="#fff" stroke-width="2"/>
        <text x="300" y="115" fill="#2c3e50" font-weight="bold" text-anchor="middle">Decode</text>
        <rect x="340" y="90" width="80" height="40" fill="#e67e22" stroke="#fff" stroke-width="2"/>
        <text x="380" y="115" fill="#fff" font-weight="bold" text-anchor="middle">Execute</text>
        <rect x="420" y="90" width="80" height="40" fill="#27ae60" stroke="#fff" stroke-width="2"/>
        <text x="460" y="115" fill="#fff" font-weight="bold" text-anchor="middle">Write</text>

        <rect x="0" y="140" width="100" height="40" fill="#ebdef0" stroke="#bdc3c7"/>
        <text x="50" y="165" font-weight="bold" fill="#2c3e50" text-anchor="middle">Komut 3</text>
        <rect x="260" y="140" width="80" height="40" fill="#3498db" stroke="#fff" stroke-width="2"/>
        <text x="300" y="165" fill="#fff" font-weight="bold" text-anchor="middle">Fetch</text>
        <rect x="340" y="140" width="80" height="40" fill="#f1c40f" stroke="#fff" stroke-width="2"/>
        <text x="380" y="165" fill="#2c3e50" font-weight="bold" text-anchor="middle">Decode</text>
        <rect x="420" y="140" width="80" height="40" fill="#e67e22" stroke="#fff" stroke-width="2"/>
        <text x="460" y="165" fill="#fff" font-weight="bold" text-anchor="middle">Execute</text>
        <rect x="500" y="140" width="80" height="40" fill="#27ae60" stroke="#fff" stroke-width="2"/>
        <text x="540" y="165" fill="#fff" font-weight="bold" text-anchor="middle">Write</text>
    </g>

    <text x="375" y="270" font-size="14" font-style="italic" fill="#7f8c8d" text-anchor="middle">Donanım kaynakları aynı anda farklı komutlar tarafından verimli şekilde paylaşılır.</text>
</svg>
